version: "3.9"

networks:
  dokploy-network:
    external: true

services:
  jaypolymind-api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      # LLM
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME}
      OPENAI_API_KEY: ${LLM_API_KEY}
      OPENAI_API_BASE_URL: ${LLM_BASE_URL}
      # Embeddings (OpenRouter)
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-https://openrouter.ai/api/v1}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-openai/text-embedding-3-small}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1536}
      # Neo4j
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      # Auth
      ADMIN_LOGIN: ${ADMIN_LOGIN:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DEMO_LOGIN: ${DEMO_LOGIN:-demo}
      DEMO_PASSWORD: ${DEMO_PASSWORD}
      # Deep Research
      SEARXNG_URL: http://searxng:8080
      DEEP_RESEARCH_ENABLED: ${DEEP_RESEARCH_ENABLED:-false}
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - uploads_data:/app/backend/uploads
    mem_limit: 2560m
    networks:
      - dokploy-network
      - default
    expose:
      - "5001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    networks:
      - dokploy-network
      - default
    expose:
      - "80"
    depends_on:
      - jaypolymind-api

  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    environment:
      SEARXNG_BASE_URL: http://searxng:8080/
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    networks:
      - default
    mem_limit: 256m

  neo4j:
    image: neo4j:5.18-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 768m
      NEO4J_server_memory_pagecache_size: 256m
    mem_limit: 1200m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - default

volumes:
  neo4j_data:
  neo4j_logs:
  uploads_data:
