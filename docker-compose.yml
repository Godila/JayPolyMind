services:
  jaypolymind:
    build: .
    expose:
      - "3000"
      - "5001"
    environment:
      # LLM — внешний OpenAI-совместимый провайдер (задаётся в Dokploy)
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME}
      # CAMEL-AI тоже читает OPENAI_* переменные
      OPENAI_API_KEY: ${LLM_API_KEY}
      OPENAI_API_BASE_URL: ${LLM_BASE_URL}
      # Эмбеддинги — используем edgequake-ollama (уже запущен на сервере)
      EMBEDDING_BASE_URL: http://edgequake-ollama:11434
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      # Neo4j — внутренний контейнер
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      # Auth — учётные данные для входа в UI
      ADMIN_LOGIN: ${ADMIN_LOGIN:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DEMO_LOGIN: ${DEMO_LOGIN:-demo}
      DEMO_PASSWORD: ${DEMO_PASSWORD}
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/backend/uploads
    networks:
      - jaypolymind-internal
      - dokploy-network
    restart: unless-stopped

  neo4j:
    image: neo4j:5.18-community
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 2G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - jaypolymind-internal
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:

networks:
  jaypolymind-internal:
    driver: bridge
  dokploy-network:
    external: true
    name: dokploy-network
