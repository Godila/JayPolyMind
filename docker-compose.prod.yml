services:
  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN is required (e.g. test.haragy.top)}
      ACME_EMAIL: ${ACME_EMAIL:-gkaitmazov@proton.me}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - jaypolymind-api
    networks:
      - app-net
    restart: unless-stopped

  jaypolymind-api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      # LLM
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME}
      OPENAI_API_KEY: ${LLM_API_KEY}
      OPENAI_API_BASE_URL: ${LLM_BASE_URL}
      # Embeddings (OpenRouter)
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-https://openrouter.ai/api/v1}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-openai/text-embedding-3-small}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1536}
      # Neo4j
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      # Auth
      ADMIN_LOGIN: ${ADMIN_LOGIN:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DEMO_LOGIN: ${DEMO_LOGIN:-demo}
      DEMO_PASSWORD: ${DEMO_PASSWORD}
      # Deep Research
      SEARXNG_URL: http://searxng:8080
      DEEP_RESEARCH_ENABLED: ${DEEP_RESEARCH_ENABLED:-false}
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/backend/uploads
    networks:
      - app-net
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    environment:
      SEARXNG_BASE_URL: http://searxng:8080/
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    networks:
      - app-net
    mem_limit: 256m
    restart: unless-stopped

  neo4j:
    image: neo4j:5.18-community
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 128m
    mem_limit: 768m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app-net
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  caddy_data:
  caddy_config:

networks:
  app-net:
    driver: bridge
